name: Sync jotego upstream

# [MiSTer-DB9 BEGIN] - upstream sync workflow (jotego/jtcores → master)
# Periodically pulls jotego upstream into our master branch using the
# whitespace-ignoring merge strategy that the per-core forks already use
# in Forks_MiSTer/fork_ci_template/.github/sync_release.sh. On a clean
# merge we push master and the next nightly compile-mister-db9 run picks
# up the new HEAD; on conflict we abort and surface a workflow failure
# for the maintainer to rebase by hand. Never force-pushes.
# [MiSTer-DB9 END]

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours

permissions:
  contents: write

concurrency:
  group: sync-jotego-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.email "ci@mister-db9.local"
          git config user.name "MiSTer-DB9 CI"

      - name: Fetch jotego upstream
        run: |
          git remote add upstream https://github.com/jotego/jtcores.git
          git fetch --no-tags upstream master

      - name: Detect new commits
        id: detect
        run: |
          BEHIND=$(git rev-list --count master..upstream/master)
          AHEAD=$(git rev-list --count upstream/master..master)
          echo "behind=${BEHIND}" >> "$GITHUB_OUTPUT"
          echo "ahead=${AHEAD}" >> "$GITHUB_OUTPUT"
          echo "Master is ${AHEAD} ahead, ${BEHIND} behind upstream/master"

      - name: Merge upstream
        if: steps.detect.outputs.behind != '0'
        run: |
          # Mirror the per-core fork strategy: ignore whitespace-only diffs to
          # tolerate jotego's occasional reformatting churn. Anything else is
          # a real conflict and bails to manual review.
          if git merge -Xignore-all-space --no-edit upstream/master; then
            echo "Merge text-clean; running guards before push."
          else
            echo "::error::Upstream merge conflict — manual rebase required"
            git merge --abort || true
            exit 1
          fi

      # [MiSTer-DB9-Pro BEGIN] - post-merge guards: marker balance + key-gate regression
      - name: Marker + key-gate regression guards
        if: steps.detect.outputs.behind != '0'
        run: |
          fail=0
          MISTER=modules/jtframe/target/mister/hdl
          # Marker balance: -ho counts occurrences (not lines), so multi-marker
          # one-liners are accounted correctly.
          for tag in "MiSTer-DB9" "MiSTer-DB9-Pro"; do
            B=$(grep -rho "\[$tag BEGIN\]" modules/jtframe .github 2>/dev/null | wc -l)
            E=$(grep -rho "\[$tag END\]"   modules/jtframe .github 2>/dev/null | wc -l)
            if [[ "$B" != "$E" ]]; then
              echo "::error::$tag markers unbalanced (BEGIN=$B END=$E)"
              fail=1
            fi
          done
          # saturn_unlocked must NOT be tied back to 0. Pinned paths (only three
          # files reference it). Catches wire/assign/reg with 1'b0/1'd0/0; skips
          # // comment lines (joydb.sv:23 documents the legacy tie-off pattern).
          if grep -nE "saturn_unlocked\s*=\s*(1'[bdh]0|0)\b" \
               "$MISTER/sys/hps_io.sv" "$MISTER/jtframe_mister.sv" "$MISTER/joydb.sv" 2>/dev/null \
             | grep -vE '^[^:]+:[0-9]+:[[:space:]]*//'; then
            echo "::error::saturn_unlocked stub regression — Phase 2 wiring lost"
            fail=1
          fi
          # Key gate cmd hook must reach uio_block.cmd in hps_io
          if ! grep -q "uio_block\.cmd == 16'hFE" "$MISTER/sys/hps_io.sv"; then
            echo "::error::db9_key_gate cmd hook missing/renamed in hps_io.sv"
            fail=1
          fi
          # joydb.sv must AND-gate Saturn arms with saturn_unlocked (order-agnostic, & or &&)
          if ! grep -qE "(saturn_unlocked\s*&{1,2}\s*joy_saturn_en|joy_saturn_en\s*&{1,2}\s*saturn_unlocked)" \
                "$MISTER/joydb.sv"; then
            echo "::error::joydb.sv saturn AND-gate missing"
            fail=1
          fi
          # sys.qip must register all three key-gate files (single read)
          n=$(grep -cE "siphash24\.v|db9_key_gate\.sv|db9_key_secret\.vh" "$MISTER/sys/sys.qip")
          if [[ "$n" -lt 3 ]]; then
            echo "::error::sys.qip missing one or more key-gate file references (found $n/3)"
            fail=1
          fi
          [[ $fail -eq 0 ]] || exit 1

      - name: Push merged master
        if: steps.detect.outputs.behind != '0'
        run: |
          git push origin master
      # [MiSTer-DB9-Pro END]

      - name: Nothing to do
        if: steps.detect.outputs.behind == '0'
        run: echo "Already up to date with jotego/jtcores master."
