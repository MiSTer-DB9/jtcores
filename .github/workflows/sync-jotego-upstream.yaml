name: Sync jotego upstream

# [MiSTer-DB9 BEGIN] - upstream sync workflow (jotego/jtcores → master)
# Pulls the last *released* jotego SHA into our master, not upstream/master
# HEAD. The released SHA is read from jotego/jtbin commit messages
# ("release for https://github.com/jotego/jtcores/commit/<sha>"), which is
# the only reliable signal — jtcores tags are abandoned (latest v1.7.3 is
# from Jan 2024) and GitHub releases are empty. This avoids dragging in
# upstream WIP / broken commits (cps15, cps1, …) that periodically break
# the build. Merge uses the whitespace-ignoring strategy from
# Forks_MiSTer/fork_ci_template/.github/sync_release.sh, with rerere
# trained from this fork's prior merge commits so recurring conflicts
# (e.g. the DB9 wrap in jtframe_mister.sv) auto-replay. Jotego's own
# workflows are kept in-tree (so their merges stay clean) but disabled via
# the Actions API every run, never git-deleted — committing the deletion
# turned every jotego edit to those files into a delete/modify conflict.
# On a clean/auto-resolved merge we push master and the next nightly
# compile-mister-db9 run picks up the new HEAD; on a genuine, never-seen
# conflict we abort for a one-time manual rebase. Never force-pushes.
# [MiSTer-DB9 END]

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours

permissions:
  contents: write
  actions: write   # gh workflow disable (Disable upstream jotego workflows)

concurrency:
  group: sync-jotego-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.email "ci@mister-db9.local"
          git config user.name "MiSTer-DB9 CI"
          # rerere: learn/replay conflict resolutions. autoupdate stages a
          # cached resolution automatically (the merge still stops for the
          # commit, handled in "Merge upstream").
          git config rerere.enabled true
          git config rerere.autoupdate true

      - name: Fetch jotego upstream
        run: |
          git remote add upstream https://github.com/jotego/jtcores.git
          # Fetch master so the released SHA (which lives on master history)
          # resolves locally — `git fetch <sha>` is unreliable on stock GH.
          git fetch --no-tags upstream master

      - name: Resolve last released SHA
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          API='https://api.github.com/repos/jotego/jtbin/commits?per_page=20'
          # Walk recent jtbin commits — most recent is usually a release commit
          # ("release for https://github.com/jotego/jtcores/commit/<sha>") but
          # some are housekeeping (e.g. "NGP cores restored to 7th Nov
          # version"), so take the first match, not strictly HEAD.
          RELEASED_SHA=$(
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              "$API" \
            | jq -r '.[].commit.message' \
            | grep -oE 'jtcores/commit/[0-9a-f]{40}' \
            | head -1 \
            | cut -d/ -f3
          )
          if [[ -z "${RELEASED_SHA:-}" ]]; then
            echo "::error::no 'release for ...jtcores/commit/<sha>' found in last 20 jtbin commits"
            exit 1
          fi
          if ! git cat-file -e "${RELEASED_SHA}^{commit}" 2>/dev/null; then
            echo "::error::released SHA ${RELEASED_SHA} not reachable in fetched upstream/master"
            exit 1
          fi
          echo "released_sha=${RELEASED_SHA}" >> "$GITHUB_OUTPUT"
          echo "Last released jotego SHA per jtbin: ${RELEASED_SHA}"

      - name: Detect new commits
        id: detect
        run: |
          RSHA='${{ steps.release.outputs.released_sha }}'
          if git merge-base --is-ancestor "$RSHA" HEAD; then
            echo "behind=0" >> "$GITHUB_OUTPUT"
            echo "Fork master already includes released SHA ${RSHA}"
          else
            BEHIND=$(git rev-list --count "master..${RSHA}")
            echo "behind=${BEHIND}" >> "$GITHUB_OUTPUT"
            echo "Master is ${BEHIND} behind released SHA ${RSHA}"
          fi

      # [MiSTer-DB9 BEGIN] - rerere training (mirrors Forks_MiSTer rerere_train.sh)
      - name: Train rerere from merge history
        if: steps.detect.outputs.behind != '0'
        run: |
          # The rr-cache is not persisted across CI checkouts, so rebuild it
          # every run by replaying this fork's prior merge commits. Once a
          # genuine conflict is resolved by hand on master, rerere learns it
          # here and auto-resolves the same conflict on every later sync —
          # the same mechanism the per-core forks use in sync_release.sh.
          ORIGINAL_BRANCH=$(git symbolic-ref -q HEAD) ||
          ORIGINAL_HEAD=$(git rev-parse --verify HEAD) || {
            echo >&2 "rerere-train: Not on any branch and no commit yet?"
            exit 1
          }
          mkdir -p ".git/rr-cache" || true
          git rev-list --parents HEAD |
          while read -r commit parent1 other_parents; do
            if test -z "${other_parents}"; then
              continue   # skip non-merges
            fi
            git checkout -q "${parent1}^0"
            # word-split intended: a merge commit can have >1 other parent
            # shellcheck disable=SC2086
            if git merge ${other_parents} >/dev/null 2>&1; then
              continue   # cleanly merges, nothing to learn
            fi
            if test -s ".git/MERGE_RR"; then
              git show -s --pretty=format:"Learning from %h %s%n" "${commit}"
              git rerere
              git checkout -q "${commit}" -- .
              git rerere
            fi
            git reset -q --hard
          done
          if test -z "${ORIGINAL_BRANCH:-}"; then
            git checkout -q "${ORIGINAL_HEAD}"
          else
            git checkout -q "${ORIGINAL_BRANCH#refs/heads/}"
          fi
      # [MiSTer-DB9 END]

      - name: Merge upstream
        if: steps.detect.outputs.behind != '0'
        run: |
          RSHA='${{ steps.release.outputs.released_sha }}'
          # Mirror the per-core fork strategy: ignore whitespace-only diffs to
          # tolerate jotego's occasional reformatting churn.
          if git merge -Xignore-all-space --no-edit \
               -m "Merge jotego release ${RSHA} (per jtbin)" "$RSHA"; then
            echo "Merge text-clean; continuing."
          else
            # rerere.autoupdate stages resolutions it has been trained on but
            # does not commit the merge. If no unmerged paths remain, every
            # conflict was auto-resolved from the trained cache -> finalize.
            # Otherwise a genuine, never-resolved conflict needs a human once
            # (after which the resolving merge commit on master trains rerere
            # and the next sync auto-resolves it). Upstream workflow files are
            # no longer deleted, so there is no delete/modify conflict class.
            if [ -z "$(git ls-files -u)" ]; then
              git commit --no-edit
              echo "rerere auto-resolved all conflicts; merge finalized."
            else
              echo "::error::Upstream merge conflict — manual rebase required"
              git ls-files -u | awk '{print $4}' | sort -u | sed 's/^/  conflict: /'
              git merge --abort || true
              exit 1
            fi
          fi

      # [MiSTer-DB9-Pro BEGIN] - post-merge guards: marker balance + key-gate regression
      - name: Marker + key-gate regression guards
        if: steps.detect.outputs.behind != '0'
        run: |
          fail=0
          MISTER=modules/jtframe/target/mister/hdl
          # Marker balance: -ho counts occurrences (not lines), so multi-marker
          # one-liners are accounted correctly.
          for tag in "MiSTer-DB9" "MiSTer-DB9-Pro"; do
            B=$(grep -rho "\[$tag BEGIN\]" modules/jtframe .github 2>/dev/null | wc -l)
            E=$(grep -rho "\[$tag END\]"   modules/jtframe .github 2>/dev/null | wc -l)
            if [[ "$B" != "$E" ]]; then
              echo "::error::$tag markers unbalanced (BEGIN=$B END=$E)"
              fail=1
            fi
          done
          # saturn_unlocked must NOT be tied back to 0. Pinned paths (only three
          # files reference it). Catches wire/assign/reg with 1'b0/1'd0/0; skips
          # // comment lines (joydb.sv:23 documents the legacy tie-off pattern).
          if grep -nE "saturn_unlocked\s*=\s*(1'[bdh]0|0)\b" \
               "$MISTER/sys/hps_io.sv" "$MISTER/jtframe_mister.sv" "$MISTER/joydb.sv" 2>/dev/null \
             | grep -vE '^[^:]+:[0-9]+:[[:space:]]*//'; then
            echo "::error::saturn_unlocked stub regression — Phase 2 wiring lost"
            fail=1
          fi
          # Key gate cmd hook must reach uio_block.cmd in hps_io
          if ! grep -q "uio_block\.cmd == 16'hFE" "$MISTER/sys/hps_io.sv"; then
            echo "::error::db9_key_gate cmd hook missing/renamed in hps_io.sv"
            fail=1
          fi
          # joydb.sv must AND-gate Saturn arms with saturn_unlocked (order-agnostic, & or &&)
          if ! grep -qE "(saturn_unlocked\s*&{1,2}\s*joy_saturn_en|joy_saturn_en\s*&{1,2}\s*saturn_unlocked)" \
                "$MISTER/joydb.sv"; then
            echo "::error::joydb.sv saturn AND-gate missing"
            fail=1
          fi
          # sys.qip must register all three key-gate files (single read)
          n=$(grep -cE "siphash24\.v|db9_key_gate\.sv|db9_key_secret\.vh" "$MISTER/sys/sys.qip")
          if [[ "$n" -lt 3 ]]; then
            echo "::error::sys.qip missing one or more key-gate file references (found $n/3)"
            fail=1
          fi
          [[ $fail -eq 0 ]] || exit 1

      - name: Push merged master
        if: steps.detect.outputs.behind != '0'
        run: |
          git push origin master
      # [MiSTer-DB9-Pro END]

      # [MiSTer-DB9 BEGIN] - disable (don't delete) upstream jotego workflows
      - name: Disable upstream jotego workflows
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Jotego's workflow files stay in-tree so upstream merges of those
          # paths are ordinary clean 3-way merges (no delete/modify conflict
          # class). They must never *run* here (private submodules /
          # jotego-only infra), so disable every workflow except the two
          # fork-owned ones, every run (incl. on merge abort), so anything
          # jotego newly adds is disabled on the next tick. Idempotent.
          keep_re='^(compile-mister-db9|sync-jotego-upstream)\.ya?ml$'
          gh workflow list --all --repo "$GITHUB_REPOSITORY" \
              --json name,path,state,id \
            | jq -c '.[]' \
            | while read -r wf; do
                path=$(jq -r '.path'  <<<"$wf")
                state=$(jq -r '.state' <<<"$wf")
                id=$(jq -r '.id'    <<<"$wf")
                name=$(jq -r '.name'  <<<"$wf")
                base=${path##*/}
                if [[ "$base" =~ $keep_re ]]; then
                  continue
                fi
                if [[ "$state" == "active" ]]; then
                  echo "Disabling: $name ($base)"
                  gh workflow disable "$id" --repo "$GITHUB_REPOSITORY" || true
                else
                  echo "Already $state: $name ($base)"
                fi
              done
      # [MiSTer-DB9 END]

      - name: Nothing to do
        if: steps.detect.outputs.behind == '0'
        run: echo "Already up to date with last released jotego SHA (${{ steps.release.outputs.released_sha }})."
